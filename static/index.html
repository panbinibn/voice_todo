<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>随听todolist</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-dark: #e55a5a;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-light: #B2BEC3;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-lg: 20px;
            --bottom-bar-height: 80px;
            --drawer-width: 280px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -100%;
            width: var(--drawer-width);
            height: 100%;
            background: white;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: calc(var(--bottom-bar-height) + 20px);
        }
        .drawer.open {
            left: 0;
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.show {
            display: block;
        }
        .drawer-header {
            padding: 20px 16px 10px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-drawer {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .drawer-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
        }
        .drawer-todo-item {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            background: #F8F9FA;
            border-left: 4px solid var(--secondary);
            cursor: pointer;
        }
        .drawer-todo-item h4 { font-size: 15px; margin-bottom: 4px; }
        .drawer-todo-item p { font-size: 12px; color: var(--text-secondary); }

        .main-content {
            padding: 20px 16px calc(var(--bottom-bar-height) + 20px);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .header .menu-btn {
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }

        .current-todo-area {
            margin-bottom: 20px;
        }

        .input-mode-area {
            display: none;
        }
        .input-mode-area.active {
            display: block;
        }

        .text-input-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }
        .text-input-card textarea {
            width: 100%;
            border: 1px solid #E0E6ED;
            border-radius: var(--radius);
            padding: 12px;
            font-size: 16px;
            resize: none;
            min-height: 80px;
            outline: none;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-bar-height);
            background: white;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 20px;
            z-index: 900;
        }
        .bottom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
        }
        .bottom-btn:active {
            background: #eee;
        }
        .record-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: white;
            box-shadow: 0 4px 14px rgba(255,107,107,0.35);
            font-size: 28px;
        }
        .record-btn.recording {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #e55a5a, #d63031);
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .player-box {
            margin: 10px 0;
            background: white;
            border-radius: var(--radius);
            padding: 8px;
        }
        .player-box audio { width: 100%; }

        .generate-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .todo-result {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }
        .todo-result-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-start;
        }
        .todo-result-item img {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            margin-right: 12px;
        }
        /* ========== 录音模态框 ========== */
        .record-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .record-modal.active {
            display: flex;
        }
        .record-modal .hint-text {
            color: white;
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .record-modal .wave-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 80px;
            margin-bottom: 40px;
        }
        .record-modal .wave-bar {
            width: 6px;
            height: 20px;
            background: var(--primary);
            border-radius: 3px;
            animation: wave 1.2s ease-in-out infinite;
        }
        .record-modal .wave-bar:nth-child(1) { animation-delay: 0s; }
        .record-modal .wave-bar:nth-child(2) { animation-delay: 0.1s; }
        .record-modal .wave-bar:nth-child(3) { animation-delay: 0.2s; }
        .record-modal .wave-bar:nth-child(4) { animation-delay: 0.3s; }
        .record-modal .wave-bar:nth-child(5) { animation-delay: 0.4s; }
        .record-modal .wave-bar:nth-child(6) { animation-delay: 0.5s; }
        .record-modal .wave-bar:nth-child(7) { animation-delay: 0.6s; }
        .record-modal .wave-bar:nth-child(8) { animation-delay: 0.7s; }
        .record-modal .wave-bar:nth-child(9) { animation-delay: 0.8s; }

        @keyframes wave {
            0%, 100% { height: 20px; }
            50% { height: 70px; }
        }

        .record-modal .release-hint {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- 抽屉覆盖层 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

    <!-- 左侧抽屉 -->
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <span>📋 历史待办</span>
            <button class="close-drawer" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-list" id="drawerList">
            <p style="color:var(--text-light);text-align:center;">加载中...</p>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-content">
        <div class="header">
            <button class="menu-btn" onclick="openDrawer()">☰</button>
            <h1>🧠 随手记</h1>
        </div>

        <!-- 当前待办显示区域 -->
        <div class="current-todo-area" id="currentTodoArea">
            <p style="text-align:center;color:var(--text-light);">记录你的一句话，自动生成待办</p>
        </div>

        <!-- 手动输入模式 -->
        <div class="input-mode-area" id="inputModeArea">
            <div class="text-input-card">
                <textarea id="manualText" placeholder="输入待办内容..."></textarea>
                <button class="generate-btn" onclick="generateFromText()">✨ 生成待办</button>
            </div>
        </div>

        <!-- 录音完成后显示的播放与生成按钮 -->
        <div id="audioPlaybackArea" style="display:none;">
            <div class="player-box" id="playerContainer"></div>
            <button class="generate-btn" onclick="generateFromRecording()">✨ 生成待办</button>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="bottom-bar">
        <button class="bottom-btn" id="keyboardBtn" onclick="toggleInputMode()">⌨️</button>
        <button class="bottom-btn record-btn" id="recordBtn">🎤</button>
    </div>
    <!-- 录音模态框 -->
    <div class="record-modal" id="recordModal">
        <div class="hint-text">🎤 正在聆听...</div>
        <div class="wave-box">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="release-hint">松手结束录音</div>
    </div>

   <script>
    let audioChunks = [];
    let mediaRecorder;
    let audioStream = null;
    let recordedBlob = null;
    let inputModeActive = false;
    let userId = localStorage.getItem('todo_user_id');
    if (!userId) {
        userId = 'user_' + crypto.randomUUID();
        localStorage.setItem('todo_user_id', userId);
    }

    // ---------- 抽屉控制 ----------
    function openDrawer() {
        document.getElementById('drawer').classList.add('open');
        document.getElementById('drawerOverlay').classList.add('show');
        loadDrawerTodos();
    }
    function closeDrawer() {
        document.getElementById('drawer').classList.remove('open');
        document.getElementById('drawerOverlay').classList.remove('show');
    }

    async function loadDrawerTodos() {
        const drawerList = document.getElementById('drawerList');
        drawerList.innerHTML = '<p style="color:var(--text-light);text-align:center;">加载中...</p>';
        try {
            const resp = await fetch(`/api/todos?user_id=${userId}`);
            const data = await resp.json();
            if (data.todos && data.todos.length > 0) {
                drawerList.innerHTML = data.todos.map(t => `
                    <div class="drawer-todo-item">
                        <h4>${t.title}</h4>
                        <p>⏰ ${t.deadline || '无'} | 📁 ${t.category || '未分类'}</p>
                    </div>
                `).join('');
            } else {
                drawerList.innerHTML = '<p style="color:var(--text-light);text-align:center;">暂无待办</p>';
            }
        } catch (e) {
            drawerList.innerHTML = '<p style="color:var(--text-light);text-align:center;">加载失败</p>';
        }
    }

    // ---------- 输入模式切换 ----------
    function toggleInputMode() {
        inputModeActive = !inputModeActive;
        const area = document.getElementById('inputModeArea');
        const audioArea = document.getElementById('audioPlaybackArea');
        const currentArea = document.getElementById('currentTodoArea');
        if (inputModeActive) {
            area.classList.add('active');
            audioArea.style.display = 'none';
            currentArea.innerHTML = '';
        } else {
            area.classList.remove('active');
        }
    }

    // ---------- 录音按钮（iPhone 13 兼容版）----------
    const recordBtn = document.getElementById('recordBtn');
    const statusElem = document.getElementById('status');

   recordBtn.addEventListener('touchstart', async (e) => {
    e.preventDefault();
    if (inputModeActive) toggleInputMode();

    // 首次使用，只申请权限
    if (!audioStream) {
        try {
            audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('currentTodoArea').innerHTML =
                '<p style="text-align:center;color:var(--primary);">✅ 麦克风已就绪，请再次按住录音</p>';
        } catch (err) {
            alert("无法访问麦克风：" + err.message);
        }
        return;
    }

    // 显示录音动画界面
    const modal = document.getElementById('recordModal');
    modal.classList.add('active');

    // 尝试多种录音格式
    const mimeTypes = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/aac', ''];
    let started = false;
    for (const mime of mimeTypes) {
        if (started) break;
        try {
            const options = mime ? { mimeType: mime } : {};
            mediaRecorder = new MediaRecorder(audioStream, options);
            mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);
            mediaRecorder.onstop = () => {
                // 隐藏动画界面
                modal.classList.remove('active');
                if (audioChunks.length > 0) {
                    recordedBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    showPlayerFallback(recordedBlob);
                }
            };
            audioChunks = [];
            mediaRecorder.start();
            recordBtn.classList.add('recording');
            started = true;
        } catch (err) {
            console.warn('尝试格式失败:', mime, err);
        }
    }
    if (!started) {
        modal.classList.remove('active');
        alert('当前浏览器不支持录音，请使用手动输入');
    }
});


    recordBtn.addEventListener('touchend', () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.classList.remove('recording');
    }
});

    // ---------- 播放器（iPhone 对 webm 不友好）----------
    function showPlayerFallback(blob) {
        const container = document.getElementById('playerContainer');
        const url = URL.createObjectURL(blob);
        const mime = blob.type;

        if (mime && mime.includes('webm')) {
            container.innerHTML = `
                <p style="color:var(--text-secondary);font-size:14px;text-align:center;">
                    ⚠️ 你的浏览器可能不支持直接播放该格式<br>
                    可以直接点击「生成待办」，后台会自动识别
                </p>
                <audio controls src="${url}" style="width:100%;"></audio>
            `;
        } else {
            container.innerHTML = `<audio controls src="${url}" style="width:100%;"></audio>`;
        }

        document.getElementById('audioPlaybackArea').style.display = 'block';
        document.getElementById('currentTodoArea').innerHTML = '';
        document.getElementById('inputModeArea').classList.remove('active');
        inputModeActive = false;
    }

    // ---------- 提交待办 ----------
    async function generateFromRecording() {
        if (!recordedBlob) return;
        const formData = new FormData();
        const image = document.getElementById('imageInput')?.files[0];
        formData.append('audio', recordedBlob, 'recording.webm');
        formData.append('user_id', userId);
        if (image) formData.append('image', image);
        await submitForm(formData);
    }

    async function generateFromText() {
        const text = document.getElementById('manualText').value.trim();
        if (!text) return;
        const formData = new FormData();
        formData.append('text', text);
        formData.append('user_id', userId);
        await submitForm(formData);
    }

    async function submitForm(formData) {
        const currentArea = document.getElementById('currentTodoArea');
        currentArea.innerHTML = '<p style="text-align:center;">⏳ 正在处理...</p>';
        try {
            const resp = await fetch('/api/todo', { method: 'POST', body: formData });
            const data = await resp.json();
            renderTodos(data.todos);
            recordedBlob = null;
            document.getElementById('audioPlaybackArea').style.display = 'none';
            document.getElementById('playerContainer').innerHTML = '';
            document.getElementById('inputModeArea').classList.remove('active');
            inputModeActive = false;
        } catch (e) {
            currentArea.innerHTML = '<p style="color:red;">请求失败，请重试</p>';
        }
    }

    // ---------- 渲染待办 ----------
    function renderTodos(todos) {
        const currentArea = document.getElementById('currentTodoArea');
        if (!todos || todos.length === 0) {
            currentArea.innerHTML = '<p style="text-align:center;">未生成待办</p>';
            return;
        }
        let html = '';
        todos.forEach(t => {
            const icon = {"高":"🔴","中":"🟡","低":"🟢"}[t.priority] || "⚪";
            html += `<div class="todo-result-item">`;
            if (t.image_url) html += `<img src="${t.image_url}" />`;
            html += `<div style="flex:1;"><strong>${t.title}</strong><br><span style="font-size:13px;color:var(--text-secondary);">⏰ ${t.deadline || '无'} | 📁 ${t.category || '未知'} | ${icon} ${t.priority || '中'}</span></div></div>`;
        });
        currentArea.innerHTML = html;
        loadDrawerTodos();  // 同步更新抽屉
    }

    // ---------- 启动时加载历史 ----------
    window.addEventListener('load', () => {
        loadDrawerTodos();
    });
</script>
    <!-- 隐藏的图片 input，如果需要可以通过其他方式触发 -->
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
</body>
</html>
