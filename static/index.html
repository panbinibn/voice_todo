<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 记忆外挂</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-dark: #e55a5a;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-light: #B2BEC3;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-lg: 20px;
            --bottom-bar-height: 80px;
            --drawer-width: 280px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -100%;
            width: var(--drawer-width);
            height: 100%;
            background: white;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: calc(var(--bottom-bar-height) + 20px);
        }
        .drawer.open {
            left: 0;
        }
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.show {
            display: block;
        }
        .drawer-header {
            padding: 20px 16px 10px;
            border-bottom: 1px solid #eee;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-drawer {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .drawer-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px;
        }
        .drawer-todo-item {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            background: #F8F9FA;
            border-left: 4px solid var(--secondary);
            cursor: pointer;
        }
        .drawer-todo-item h4 { font-size: 15px; margin-bottom: 4px; }
        .drawer-todo-item p { font-size: 12px; color: var(--text-secondary); }

        .main-content {
            padding: 20px 16px calc(var(--bottom-bar-height) + 20px);
            min-height: 100vh;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .header .menu-btn {
            font-size: 28px;
            background: none;
            border: none;
            cursor: pointer;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
        }

        .current-todo-area {
            margin-bottom: 20px;
        }

        .input-mode-area {
            display: none;
        }
        .input-mode-area.active {
            display: block;
        }

        .text-input-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }
        .text-input-card textarea {
            width: 100%;
            border: 1px solid #E0E6ED;
            border-radius: var(--radius);
            padding: 12px;
            font-size: 16px;
            resize: none;
            min-height: 80px;
            outline: none;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-bar-height);
            background: white;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 20px;
            z-index: 900;
        }
        .bottom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: var(--bg);
            color: var(--text);
            transition: all 0.2s;
        }
        .bottom-btn:active {
            background: #eee;
        }
        .record-btn {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: white;
            box-shadow: 0 4px 14px rgba(255,107,107,0.35);
            font-size: 28px;
        }
        .record-btn.recording {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #e55a5a, #d63031);
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .player-box {
            margin: 10px 0;
            background: white;
            border-radius: var(--radius);
            padding: 8px;
        }
        .player-box audio { width: 100%; }

        .generate-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E8E);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .todo-result {
            background: white;
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
        }
        .todo-result-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-start;
        }
        .todo-result-item img {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <!-- 抽屉覆盖层 -->
    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

    <!-- 左侧抽屉 -->
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <span>📋 历史待办</span>
            <button class="close-drawer" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-list" id="drawerList">
            <p style="color:var(--text-light);text-align:center;">加载中...</p>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="main-content">
        <div class="header">
            <button class="menu-btn" onclick="openDrawer()">☰</button>
            <h1>🧠 AI 记忆外挂</h1>
        </div>

        <!-- 当前待办显示区域 -->
        <div class="current-todo-area" id="currentTodoArea">
            <p style="text-align:center;color:var(--text-light);">记录你的一句话，自动生成待办</p>
        </div>

        <!-- 手动输入模式 -->
        <div class="input-mode-area" id="inputModeArea">
            <div class="text-input-card">
                <textarea id="manualText" placeholder="输入待办内容..."></textarea>
                <button class="generate-btn" onclick="generateFromText()">✨ 生成待办</button>
            </div>
        </div>

        <!-- 录音完成后显示的播放与生成按钮 -->
        <div id="audioPlaybackArea" style="display:none;">
            <div class="player-box" id="playerContainer"></div>
            <button class="generate-btn" onclick="generateFromRecording()">✨ 生成待办</button>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div class="bottom-bar">
        <button class="bottom-btn" id="keyboardBtn" onclick="toggleInputMode()">⌨️</button>
        <button class="bottom-btn record-btn" id="recordBtn">🎤</button>
    </div>

    <script>
        // 全局状态
        let audioChunks = [];
        let mediaRecorder;
        let audioStream = null;
        let recordedBlob = null;
        let inputModeActive = false;
        let userId = localStorage.getItem('todo_user_id');
        if (!userId) {
            userId = 'user_' + crypto.randomUUID();
            localStorage.setItem('todo_user_id', userId);
        }

        // 抽屉控制
        function openDrawer() {
            document.getElementById('drawer').classList.add('open');
            document.getElementById('drawerOverlay').classList.add('show');
            loadDrawerTodos();
        }
        function closeDrawer() {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('drawerOverlay').classList.remove('show');
        }

        // 加载历史待办到抽屉
        async function loadDrawerTodos() {
            const drawerList = document.getElementById('drawerList');
            drawerList.innerHTML = '<p style="color:var(--text-light);text-align:center;">加载中...</p>';
            try {
                const resp = await fetch(`/api/todos?user_id=${userId}`);
                const data = await resp.json();
                if (data.todos && data.todos.length > 0) {
                    drawerList.innerHTML = data.todos.map(t => `
                        <div class="drawer-todo-item">
                            <h4>${t.title}</h4>
                            <p>⏰ ${t.deadline || '无'} | 📁 ${t.category || '未分类'}</p>
                        </div>
                    `).join('');
                } else {
                    drawerList.innerHTML = '<p style="color:var(--text-light);text-align:center;">暂无待办</p>';
                }
            } catch (e) {
                drawerList.innerHTML = '<p style="color:var(--text-light);text-align:center;">加载失败</p>';
            }
        }

        // 切换输入模式
        function toggleInputMode() {
            inputModeActive = !inputModeActive;
            const area = document.getElementById('inputModeArea');
            const audioArea = document.getElementById('audioPlaybackArea');
            const currentArea = document.getElementById('currentTodoArea');
            if (inputModeActive) {
                area.classList.add('active');
                audioArea.style.display = 'none';
                currentArea.innerHTML = '';
            } else {
                area.classList.remove('active');
            }
        }

        // 录音按钮事件
        const recordBtn = document.getElementById('recordBtn');
        recordBtn.addEventListener('touchstart', async (e) => {
            e.preventDefault();
            // 如果输入模式激活，先关闭
            if (inputModeActive) toggleInputMode();

            if (!audioStream) {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } catch (err) {
                    alert("无法访问麦克风：" + err.message);
                    return;
                }
                // 首次获取权限后不自动录音，等待下次长按
                document.getElementById('currentTodoArea').innerHTML = '<p style="text-align:center;color:var(--primary);">✅ 麦克风已就绪，请再次按住录音</p>';
                return;
            }

            try {
                mediaRecorder = new MediaRecorder(audioStream);
                mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        showAudioPlayer(recordedBlob);
                    }
                };
                audioChunks = [];
                mediaRecorder.start();
                recordBtn.classList.add('recording');
            } catch (err) {
                alert("录音启动失败：" + err.message);
            }
        });

        recordBtn.addEventListener('touchend', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                recordBtn.classList.remove('recording');
            }
        });

        // 显示音频播放器
        function showAudioPlayer(blob) {
            const url = URL.createObjectURL(blob);
            document.getElementById('playerContainer').innerHTML = `<audio controls src="${url}"></audio>`;
            document.getElementById('audioPlaybackArea').style.display = 'block';
            document.getElementById('currentTodoArea').innerHTML = '';
            document.getElementById('inputModeArea').classList.remove('active');
            inputModeActive = false;
        }

        // 从录音生成待办
        async function generateFromRecording() {
            if (!recordedBlob) return;
            const formData = new FormData();
            const image = document.getElementById('imageInput')?.files[0];
            formData.append('audio', recordedBlob, 'recording.webm');
            formData.append('user_id', userId);
            if (image) formData.append('image', image);
            await submitForm(formData);
        }

        // 从文本生成待办
        async function generateFromText() {
            const text = document.getElementById('manualText').value.trim();
            if (!text) return;
            const formData = new FormData();
            formData.append('text', text);
            formData.append('user_id', userId);
            await submitForm(formData);
        }

        // 提交并显示结果
        async function submitForm(formData) {
            const currentArea = document.getElementById('currentTodoArea');
            currentArea.innerHTML = '<p style="text-align:center;">⏳ 正在处理...</p>';
            try {
                const resp = await fetch('/api/todo', { method: 'POST', body: formData });
                const data = await resp.json();
                renderTodos(data.todos);
                // 清除录音状态
                recordedBlob = null;
                document.getElementById('audioPlaybackArea').style.display = 'none';
                document.getElementById('playerContainer').innerHTML = '';
                // 如果输入模式，关闭
                document.getElementById('inputModeArea').classList.remove('active');
                inputModeActive = false;
            } catch (e) {
                currentArea.innerHTML = '<p style="color:red;">请求失败，请重试</p>';
            }
        }

        // 渲染待办结果
        function renderTodos(todos) {
            const currentArea = document.getElementById('currentTodoArea');
            if (!todos || todos.length === 0) {
                currentArea.innerHTML = '<p style="text-align:center;">未生成待办</p>';
                return;
            }
            let html = '';
            todos.forEach(t => {
                const icon = {"高":"🔴","中":"🟡","低":"🟢"}[t.priority] || "⚪";
                html += `<div class="todo-result-item">`;
                if (t.image_url) html += `<img src="${t.image_url}" />`;
                html += `<div style="flex:1;"><strong>${t.title}</strong><br><span style="font-size:13px;color:var(--text-secondary);">⏰ ${t.deadline || '无'} | 📁 ${t.category || '未知'} | ${icon} ${t.priority || '中'}</span></div></div>`;
            });
            currentArea.innerHTML = html;
            // 更新抽屉
            loadDrawerTodos();
        }

        // 图片上传（可选，保留功能但不在界面主要位置，可在生成时附加？这里简化，暂时不加图片上传按钮。如需，可在主区域添加一个小图标触发上传）
        // 因为用户没有特别要求图片，但之前有，我们可以保留隐藏的input，通过某个按钮触发。暂时去掉图片上传UI，但保留代码逻辑。
        // 我们可以添加一个隐藏的文件输入，在生成待办前通过某个方式触发，但为了简化布局，暂时略去。以后需要再加。
        // 如果用户需要图片，可以在底部加一个附件按钮。
        // 目前先保留，但不展示选择器。如果想用，可在当前区域增加一个“📎”按钮触发。
        // 为了不丢失图片功能，我们可以在生成待办前检查是否有选中的图片，所以保留一个隐藏 input 并在合适时机弹出。
        // 这里暂时不加显式的图片按钮，保持界面简洁。
        // 如果需要，可以手动添加以下 html：<input type="file" id="imageInput" accept="image/*" style="display:none" />
        // 并在某个地方触发选择。
        // 暂且这样。

        // 页面加载时拉取历史
        window.addEventListener('load', () => {
            loadDrawerTodos();
        });
    </script>
    <!-- 隐藏的图片 input，如果需要可以通过其他方式触发 -->
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
</body>
</html>
