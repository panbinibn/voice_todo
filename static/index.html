<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 记忆外挂</title>
    <style>
        :root {
            --primary: #FF6B6B;
            --primary-dark: #e55a5a;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg: #F8F9FA;
            --card-bg: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-light: #B2BEC3;
            --success: #00B894;
            --warning: #FDCB6E;
            --danger: #E17055;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-lg: 20px;
            --font-xl: 20px;
            --font-lg: 17px;
            --font-md: 15px;
            --font-sm: 13px;
            --font-xs: 11px;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #F8F9FA 0%, #E8ECF1 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
            max-width: 500px;
            margin: auto;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 24px;
            padding-top: 10px;
        }
        .header .logo {
            font-size: 48px;
            margin-bottom: 4px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .header .subtitle {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 20px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        .card-title {
            font-size: var(--font-md);
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .icon {
            font-size: 20px;
        }

        /* 按钮 */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: var(--radius);
            font-size: var(--font-lg);
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.15s ease;
            -webkit-appearance: none;
            position: relative;
            overflow: hidden;
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #FF8E8E);
            color: white;
            box-shadow: 0 4px 14px rgba(255,107,107,0.35);
            margin-top: 8px;
        }
        .btn-record {
            background: linear-gradient(135deg, #FF6B6B, #ee5a24);
            color: white;
            box-shadow: 0 4px 14px rgba(255,107,107,0.35);
            height: 56px;
            font-size: var(--font-xl);
        }
        .btn-record.recording {
            background: linear-gradient(135deg, #e55a5a, #d63031);
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 20px rgba(255,107,107,0.5);
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(0.97); }
        }
        .btn-upload {
            background: var(--card-bg);
            color: var(--primary);
            border: 2px dashed #FDCB6E;
            box-shadow: none;
            font-weight: 500;
        }
        .btn-upload:active {
            background: #FFF5F5;
        }

        /* 输入框 */
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E0E6ED;
            border-radius: var(--radius);
            font-size: var(--font-lg);
            color: var(--text);
            background: #F8F9FA;
            transition: all 0.2s ease;
            -webkit-appearance: none;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(255,107,107,0.08);
        }
        input[type="text"]::placeholder {
            color: var(--text-light);
        }

        /* 状态栏 */
        #status {
            text-align: center;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: var(--font-sm);
            min-height: 20px;
        }

        /* 播放器 */
        .player-box {
            margin-top: 10px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: #F8F9FA;
        }
        .player-box audio {
            width: 100%;
            height: 44px;
            display: block;
        }

        /* 图片预览 */
        #preview {
            text-align: center;
            margin-top: 12px;
        }
        #preview img {
            max-width: 180px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
        }

        /* 待办卡片 */
        .todo-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            border-left: 4px solid var(--secondary);
        }
        .todo-item:active {
            transform: scale(0.98);
            box-shadow: var(--shadow-md);
        }
        .todo-item img {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            margin-right: 14px;
        }
        .todo-info {
            flex: 1;
        }
        .todo-info h3 {
            font-size: var(--font-lg);
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .todo-info p {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            line-height: 1.4;
        }
        .todo-info .meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }
        .todo-info .meta span {
            font-size: var(--font-xs);
            background: #F8F9FA;
            padding: 3px 8px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* 加载 */
        .loading {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
        }
        .loading::before {
            content: '🧠';
            font-size: 40px;
            display: block;
            animation: bounce 1s infinite;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 结果区域 */
        #result {
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🧠</div>
        <h1>AI 记忆外挂</h1>
        <p class="subtitle">说句话，自动整理成待办</p>
    </div>

    <!-- 语音卡片 -->
    <div class="card">
        <div class="card-title"><span class="icon">🎤</span> 语音输入</div>
        <button class="btn-record" id="recordBtn">按住录音</button>
        <p id="status"></p>
        <div id="playerContainer" class="player-box"></div>
    </div>

    <!-- 文字卡片 -->
    <div class="card">
        <div class="card-title"><span class="icon">✏️</span> 手动输入</div>
        <input type="text" id="textInput" placeholder="输入你想记的事..." />
    </div>

    <!-- 图片卡片 -->
    <div class="card">
        <div class="card-title"><span class="icon">📷</span> 照片（可选）</div>
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
        <button class="btn-upload" onclick="document.getElementById('imageInput').click()">选择照片</button>
        <div id="preview"></div>
    </div>

    <!-- 提交按钮 -->
    <button class="btn-primary" onclick="submitTodo()">✨ 生成待办</button>

    <!-- 结果 -->
    <div id="result"></div>

    <script>
        let audioChunks = [];
        let mediaRecorder;
        let audioStream = null;

        document.getElementById("recordBtn").addEventListener("touchstart", async (e) => {
            e.preventDefault();
            if (!audioStream) {
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    document.getElementById("status").textContent = "✅ 麦克风已就绪，请再次按住录音";
                } catch (err) {
                    alert("无法访问麦克风：" + err.message);
                }
                return;
            }

            try {
                mediaRecorder = new MediaRecorder(audioStream);
                mediaRecorder.ondataavailable = ev => audioChunks.push(ev.data);
                mediaRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        const blob = new Blob(audioChunks, { type: "audio/webm" });
                        const url = URL.createObjectURL(blob);
                        document.getElementById("playerContainer").innerHTML = `<audio controls><source src="${url}" type="audio/webm"></audio>`;
                    }
                    document.getElementById("status").textContent = "录音完成，可播放试听，点击「生成待办」提交";
                };
                audioChunks = [];
                mediaRecorder.start();
                document.getElementById("recordBtn").classList.add("recording");
                document.getElementById("recordBtn").textContent = "录音中，松开发送";
                document.getElementById("status").textContent = "正在录音...";
            } catch (err) {
                alert("录音启动失败：" + err.message);
            }
        });

        document.getElementById("recordBtn").addEventListener("touchend", () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                document.getElementById("recordBtn").classList.remove("recording");
                document.getElementById("recordBtn").textContent = "按住录音";
            }
        });

        document.getElementById("imageInput").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => document.getElementById("preview").innerHTML = `<img src="${ev.target.result}" />`;
                reader.readAsDataURL(file);
            }
        });

        function audioBufferToWav(buffer) {
            const numChannels = 1, sampleRate = 16000, bitsPerSample = 16, format = 1;
            const data = buffer.getChannelData(0);
            const dataLength = data.length * (bitsPerSample / 8);
            const headerLength = 44, totalLength = headerLength + dataLength;
            const arrayBuffer = new ArrayBuffer(totalLength), view = new DataView(arrayBuffer);
            const writeStr = (v, o, s) => { for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); };
            writeStr(view, 0, 'RIFF'); view.setUint32(4, totalLength - 8, true); writeStr(view, 8, 'WAVE');
            writeStr(view, 12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, format, true);
            view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * bitsPerSample / 8, true);
            view.setUint16(32, numChannels * bitsPerSample / 8, true); view.setUint16(34, bitsPerSample, true);
            writeStr(view, 36, 'data'); view.setUint32(40, dataLength, true);
            let offset = 44;
            for (let i = 0; i < data.length; i++) {
                const sample = Math.max(-1, Math.min(1, data[i]));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }
            return new Blob([arrayBuffer], { type: "audio/wav" });
        }

        async function submitTodo() {
            const formData = new FormData();
            const text = document.getElementById("textInput").value;
            const image = document.getElementById("imageInput").files[0];

            if (audioChunks.length > 0) {
                const webmBlob = new Blob(audioChunks, { type: "audio/webm" });
                const arrayBuffer = await webmBlob.arrayBuffer();
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                const offlineCtx = new OfflineAudioContext(1, audioBuffer.duration * 16000, 16000);
                const source = offlineCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(offlineCtx.destination);
                source.start();
                const renderedBuffer = await offlineCtx.startRendering();
                const wavBlob = audioBufferToWav(renderedBuffer);
                formData.append("audio", wavBlob, "recording.wav");
            } else if (text) {
                formData.append("text", text);
            } else {
                alert("请先录音或输入文字");
                return;
            }

            if (image) formData.append("image", image);
            document.getElementById("result").innerHTML = "<div class='loading'>正在处理...</div>";

            const resp = await fetch("/api/todo", { method: "POST", body: formData });
            const data = await resp.json();

            let html = `<p style="text-align:center;color:var(--text-secondary);margin-bottom:12px;">🎤 识别：${data.text || '(未能识别)'}</p>`;
            if (data.todos && data.todos.length > 0) {
                data.todos.forEach(t => {
                    const icon = {"高":"🔴","中":"🟡","低":"🟢"}[t.priority] || "⚪";
                    html += `<div class="todo-item">`;
                    if (t.image_url) html += `<img src="${t.image_url}" />`;
                    html += `<div class="todo-info"><h3>${t.title || '无标题'}</h3>`;
                    html += `<div class="meta"><span>⏰ ${t.deadline || '未指定'}</span><span>📁 ${t.category || '未分类'}</span><span>${icon} ${t.priority || '中'}</span></div>`;
                    if (t.notes) html += `<p style="margin-top:4px;font-size:var(--font-sm);color:var(--text-secondary);">📝 ${t.notes}</p>`;
                    html += `</div></div>`;
                });
            } else {
                html += `<p style="text-align:center;color:var(--text-secondary);">未生成待办，请重试</p>`;
            }
            document.getElementById("result").innerHTML = html;

            audioChunks = [];
            document.getElementById("playerContainer").innerHTML = "";
            document.getElementById("status").textContent = "";
        }
    </script>
</body>
</html>
